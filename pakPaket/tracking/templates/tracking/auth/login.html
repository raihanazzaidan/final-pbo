<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PakPaket | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-emerald-600">📦 pakPaket</h1>
            <p class="text-gray-500 mt-2">Masuk ke akun logistik kamu</p>
        </div>

        <form method="POST" action="{% url 'login' %}" class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 space-y-5">
            {% csrf_token %}

            {% if messages %}
                {% for message in messages %}
                    <div class="{% if message.tags == 'error' %}bg-red-50 text-red-600{% else %}bg-emerald-50 text-emerald-600{% endif %} text-sm p-3 rounded-lg flex justify-between items-center">
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input
                    type="text"
                    name="username"
                    value="{{ username_value|default:'' }}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition"
                    required
                />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input
                    type="password"
                    name="password"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition"
                    required
                />
            </div>

            <button type="submit" class="w-full bg-emerald-600 text-white py-2.5 rounded-lg font-medium hover:bg-emerald-700 transition cursor-pointer">
                Login
            </button>

            <p class="text-center text-sm text-gray-500">
                Belum punya akun? 
                <a href="{% url 'register' %}" class="text-emerald-600 hover:underline font-medium">
                    Daftar
                </a>
            </p>
        </form>
        
    </div>
</div>

</body>
</html>
