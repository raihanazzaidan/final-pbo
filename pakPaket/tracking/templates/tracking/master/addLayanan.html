<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Layanan - pakPaket</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-12">
    
    {%include 'tracking/component/navbar.html' %}

<div class="flex items-center justify-center px-4">
    <div class="w-full max-w-lg">
        
        <div class="mb-6 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Tambah Layanan Baru</h1>
                <p class="text-gray-500 text-sm mt-1">Kelola jenis pengiriman ekspedisi</p>
            </div>
            <a href="{% url 'cek_resi_publik' %}" class="text-sm font-medium text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg hover:bg-emerald-100 transition">
                &larr; Kembali
            </a>
        </div>

        <form method="POST" action="{% url 'tambah_layanan' %}" class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 space-y-5">
            {% csrf_token %}

            {% if messages %}
                {% for message in messages %}
                    <div class="{% if message.tags == 'error' %}bg-red-50 text-red-600 border-red-200{% else %}bg-emerald-50 text-emerald-600 border-emerald-200{% endif %} border text-sm p-3 rounded-lg">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Layanan</label>
                <input 
                    type="text" 
                    name="namaLayanan" 
                    value="{{ form_data.namaLayanan|default:'' }}" 
                    placeholder="Contoh: Reguler, Sameday, Kargo"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition" 
                    required 
                />
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Harga per Kg (Rp)</label>
                    <input 
                        type="number" 
                        name="hargaPerKg" 
                        value="{{ form_data.hargaPerKg|default:'' }}" 
                        placeholder="Contoh: 15000"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition" 
                        required 
                    />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Estimasi Waktu (Hari)</label>
                    <input 
                        type="number" 
                        name="estHari" 
                        value="{{ form_data.estHari|default:'' }}" 
                        placeholder="Contoh: 3"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition" 
                        required 
                    />
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-600 text-white py-2.5 mt-2 rounded-lg font-medium hover:bg-emerald-700 transition cursor-pointer">
                Simpan Layanan
            </button>
        </form>
        
    </div>
</div>

</body>
</html>
