<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PakPaket | Add User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    
    {%include 'tracking/component/navbar.html' %}

<div class="max-w-2xl mx-auto px-4 py-10">
    <div class="mb-6 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">{{ action }} Akun Pengguna</h1>
        </div>
        <a href="{% url 'get_all_user' %}" class="text-sm text-gray-500 hover:text-gray-700 transition">&larr; Kembali</a>
    </div>

    <form method="POST" action="{% if action == 'add' %}{% url 'add_user' %}{% else %}{% url 'edit_user' target_user.id %}{% endif %}" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 space-y-4">
        {% csrf_token %}
        
        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-50 text-red-600 border border-red-200 text-sm p-3 rounded-lg mb-4">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" value="{{ target_user.username|default:'' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Role Akun</label>
                <select name="role" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none bg-white" required>
                    <option value="CUSTOMER" {% if target_user.role == 'CUSTOMER' %}selected{% endif %}>Customer</option>
                    <option value="KURIR" {% if target_user.role == 'KURIR' %}selected{% endif %}>Kurir</option>
                    <option value="ADMIN" {% if target_user.role == 'ADMIN' %}selected{% endif %}>Admin</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" value="{{ target_user.email|default:'' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">No. Handphone</label>
                <input type="text" name="noHp" value="{{ target_user.noHp|default:'' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" required>
            </div>
        </div>

        <div class="pt-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Password {% if action == 'Edit' %}<span class="text-xs text-gray-400 font-normal">(Kosongkan jika tidak ingin mengubah sandi)</span>{% endif %}
            </label>
            <input type="password" name="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" {% if action == 'add' %}required{% endif %}>
        </div>

        <button type="submit" class="w-full mt-4 bg-emerald-600 text-white py-2.5 rounded-lg font-medium hover:bg-emerald-700 transition">
            Simpan Data User
        </button>
    </form>
</div>

</body>
</html>
